<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Instructions — EduSeat</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ================= PREMIUM GLASS VARIABLES ================= */
        :root {
            --primary: #22c55e;
            --primary-glow: rgba(34, 197, 94, 0.4);
            --bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --muted: #94a3b8;
            --sidebar-width: 280px;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.light {
            --bg: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-heavy: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
        }

        /* ================= DYNAMIC BACKGROUND ================= */
        .glass-master {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: var(--bg);
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -10%; right: -5%; }
        .orb-2 { width: 450px; height: 450px; background: #16a34a; bottom: -5%; left: -5%; animation-delay: -7s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 40px) scale(1.1); }
        }

        /* ================= GLOBAL STYLES ================= */
        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ================= SIDEBAR (FLOATING GLASS) ================= */
        .sidebar {
            width: var(--sidebar-width);
            height: calc(100vh - 40px);
            margin: 20px;
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 24px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: var(--transition);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 50px;
            display: flex; align-items: center; gap: 15px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .nav-btn {
            padding: 16px 20px;
            border: none; background: transparent;
            color: var(--muted); border-radius: 18px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            font-size: 15px; font-weight: 500; margin-bottom: 8px;
            transition: var(--transition);
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); transform: translateX(8px); }
        .nav-btn.active { color: var(--primary); background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }

        .sidebar-footer { margin-top: auto; }

        .toggle {
            background: var(--glass-bg);
            padding: 14px; border-radius: 16px;
            cursor: pointer; text-align: center; font-size: 14px;
            border: 1px solid var(--glass-border); margin-bottom: 12px;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .logout {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444; padding: 14px; border-radius: 16px;
            cursor: pointer; width: 100%; font-weight: 600; transition: var(--transition);
        }
        .logout:hover { background: #ef4444; color: white; }

        /* ================= MAIN CONTENT ================= */
        .main {
            margin-left: calc(var(--sidebar-width) + 60px);
            padding: 60px 40px;
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PROGRESS BAR GLASS */
        .progress {
            display: flex; gap: 15px; margin-bottom: 40px;
        }

        .step {
            flex: 1; padding: 12px; border-radius: 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            text-align: center; font-size: 13px; font-weight: 600;
            transition: var(--transition);
        }

        .step.active {
            background: rgba(34, 197, 94, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        h2 { font-size: 36px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }

        /* ================= GLASS CARD ================= */
        .card {
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 35px;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: var(--transition);
        }

        /* DROP ZONE */
        .drop {
            border: 2px dashed var(--glass-border);
            border-radius: 25px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255,255,255,0.01);
            margin-bottom: 25px;
            display: flex; flex-direction: column; align-items: center;
        }

        .drop i {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; color: var(--muted); transition: var(--transition);
        }

        .drop:hover {
            border-color: var(--primary);
            background: rgba(34, 197, 94, 0.05);
            transform: scale(1.02);
        }

        .drop:hover i { background: var(--primary); color: white; transform: rotate(5deg); }

        .drop.drag {
            border-color: var(--primary);
            background: rgba(34, 197, 94, 0.1);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .file-info { font-size: 12px; color: var(--primary); margin-top: 10px; font-weight: 700; }
        .status { font-size: 13px; margin-top: 15px; color: var(--muted); font-weight: 500; display: flex; align-items: center; gap: 8px; }

        /* BUTTON */
        .btn {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            border: none; color: white; padding: 18px 30px;
            border-radius: 20px; font-weight: 700; font-size: 16px;
            cursor: pointer; width: 100%; transition: var(--transition);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.5);
            filter: brightness(1.1);
        }

        /* TOAST & TICK */
        .toast {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--glass-heavy); backdrop-filter: blur(20px);
            border: 1px solid var(--primary); color: white;
            padding: 20px 30px; border-radius: 20px; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 1000;
        }

        .tick { width: 30px; height: 30px; }
        .tick-circle { stroke: var(--primary); stroke-width: 3; fill: none; stroke-dasharray: 166; stroke-dashoffset: 166; animation: circle 0.6s ease forwards; }
        .tick-path { stroke: var(--primary); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 48; stroke-dashoffset: 48; animation: check 0.4s 0.5s ease forwards; }
        @keyframes circle { to { stroke-dashoffset: 0; } }
        @keyframes check { to { stroke-dashoffset: 0; } }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar span, .logo span { display: none; }
            .main { margin-left: 120px; }
            .card { width: 100%; }
        }
    </style>
</head>

<body>

<div class="glass-master">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <i data-lucide="graduation-cap" size="32"></i> <span>EduSeat</span>
    </div>

    <div class="nav-group">
        <button class="nav-btn" onclick="go('dashboard')"><i data-lucide="layout-grid"></i> <span>Dashboard</span></button>
        <button class="nav-btn" onclick="go('upload')"><i data-lucide="cloud-upload"></i> <span>Upload</span></button>
        <button class="nav-btn active" onclick="go('instructions')"><i data-lucide="file-text"></i> <span>Instructions</span></button>
        <button class="nav-btn" onclick="go('generate')"><i data-lucide="cpu"></i> <span>Generate</span></button>
        <button class="nav-btn" onclick="go('email')"><i data-lucide="send"></i> <span>Email</span></button>
        <button class="nav-btn" onclick="go('history')"><i data-lucide="history"></i> <span>History</span></button>
    </div>

    <div class="sidebar-footer">
        <div class="toggle" onclick="toggleTheme()"><i data-lucide="palette"></i> <span>Theme</span></div>
        <button class="logout" onclick="logout()"><i data-lucide="log-out"></i> <span>Logout</span></button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="progress">
        <div class="step">1. Upload Data</div>
        <div class="step active">2. Instructions</div>
        <div class="step">3. Generate</div>
        <div class="step">4. Email</div>
    </div>

    <h2>Upload Instructions</h2>

    <div class="card">
        <!-- STUDENT PDF -->
        <div id="studentDrop" class="drop">
            <i data-lucide="file-text"></i>
            <strong>Student Instructions PDF</strong>
            <input type="file" hidden id="studentPdf" accept=".pdf">
            <div class="file-info" id="studentInfo"></div>
            <div class="status" id="studentStatus">Pending Upload</div>
        </div>

        <!-- TEACHER PDF -->
        <div id="teacherDrop" class="drop">
            <i data-lucide="file-check"></i>
            <strong>Teacher Guidelines PDF</strong>
            <input type="file" hidden id="teacherPdf" accept=".pdf">
            <div class="file-info" id="teacherInfo"></div>
            <div class="status" id="teacherStatus">Pending Upload</div>
        </div>

<button type="button" class="btn" onclick="nextPage()">
Continue to Generation
</button>




    </div>
</div>

<div class="toast" id="toast"></div>

<script>

/* ===== SAFE ICON LOAD ===== */
window.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
});

/* ===== HARD BLOCK ANY SUBMIT ===== */
document.addEventListener("submit", e => e.preventDefault());

const API="http://localhost:8081/api/upload";

let uploaded={
    student:false,
    teacher:false
};

/* THEME */
(function(){
const saved=localStorage.getItem("theme");
if(saved==="light") document.body.classList.add("light");
})();

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem(
"theme",
document.body.classList.contains("light") ? "light":"dark"
);
}

function go(page){ window.location=page+".html"; }
function logout(){ window.location="login.html"; }

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

/* ================= UPLOAD ================= */

function setupDrop(zoneId,fileId,statusId,endpoint,key){

let zone=document.getElementById(zoneId);
let fileInput=document.getElementById(fileId);
let status=document.getElementById(statusId);

zone.onclick=()=>fileInput.click();

/* DRAG */
zone.addEventListener("dragover",e=>{
e.preventDefault();
zone.classList.add("drag");
});

zone.addEventListener("dragleave",()=>{
zone.classList.remove("drag");
});

zone.addEventListener("drop",e=>{
e.preventDefault();
zone.classList.remove("drag");

let file=e.dataTransfer.files[0];
if(file) upload(file);
});

/* SELECT */
fileInput.addEventListener("change", ()=>{
let file=fileInput.files[0];
if(file) upload(file);
});

async function upload(file){

if(!file){
toast("No file selected");
return;
}

let form=new FormData();
form.append("file",file);

status.innerText="Uploading...";

try{

let res = await fetch(API+endpoint,{
method:"POST",
body:form
});

if(!res.ok) throw new Error();

status.innerHTML="✅ Uploaded Successfully";
uploaded[key]=true;

toast("Upload Successful");

}catch(err){

status.innerHTML="❌ Upload Failed";
toast("Server Error");

}

}

}

/* INIT */

setupDrop(
"studentDrop",
"studentPdf",
"studentStatus",
"/student-instructions",
"student"
);

setupDrop(
"teacherDrop",
"teacherPdf",
"teacherStatus",
"/teacher-instructions",
"teacher"
);

/* NEXT */

function nextPage(){

if(!uploaded.student || !uploaded.teacher){
toast("Upload both files first");
return;
}

go("generate");

}

</script>







</body>
</html>
