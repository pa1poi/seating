<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Dispatch — EduSeat</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ================= PREMIUM GLASS VARIABLES ================= */
        :root {
            --primary: #22c55e;
            --primary-glow: rgba(34, 197, 94, 0.4);
            --bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --muted: #94a3b8;
            --sidebar-width: 280px;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.light {
            --bg: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-heavy: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
        }

        /* ================= DYNAMIC BACKGROUND ================= */
        .glass-master {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: var(--bg);
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--primary); top: -10%; right: -5%; }
        .orb-2 { width: 500px; height: 500px; background: #16a34a; bottom: -10%; left: -5%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* ================= GLOBAL STYLES ================= */
        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ================= SIDEBAR (FLOATING GLASS) ================= */
        .sidebar {
            width: var(--sidebar-width);
            height: calc(100vh - 40px);
            margin: 20px;
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 24px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: var(--transition);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 50px;
            display: flex; align-items: center; gap: 15px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .nav-btn {
            padding: 16px 20px;
            border: none; background: transparent;
            color: var(--muted); border-radius: 18px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            font-size: 15px; font-weight: 500; margin-bottom: 8px;
            transition: var(--transition);
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); transform: translateX(8px); }
        .nav-btn.active { color: var(--primary); background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }

        .sidebar-footer { margin-top: auto; }

        .toggle {
            background: var(--glass-bg);
            padding: 14px; border-radius: 16px;
            cursor: pointer; text-align: center; font-size: 14px;
            border: 1px solid var(--glass-border); margin-bottom: 12px;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .logout {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444; padding: 14px; border-radius: 16px;
            cursor: pointer; width: 100%; font-weight: 600; transition: var(--transition);
        }
        .logout:hover { background: #ef4444; color: white; }

        /* ================= MAIN CONTENT ================= */
        .main {
            margin-left: calc(var(--sidebar-width) + 60px);
            padding: 60px 40px;
            width: 100%;
            max-width: 1300px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 36px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        /* ================= GLASS CARD ================= */
        .card {
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: var(--transition);
        }

        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.15); }

        h3 { 
            margin: 0 0 20px 0; font-size: 20px; font-weight: 700; color: var(--primary); 
            display: flex; align-items: center; gap: 10px;
        }

        /* TEXTAREA */
        textarea {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: var(--transition);
        }

        body.light textarea { background: rgba(255,255,255,0.4); }

        textarea:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* BUTTON */
        .btn {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            border: none; color: white; padding: 18px;
            border-radius: 20px; font-weight: 700; font-size: 16px;
            cursor: pointer; margin-top: 20px; width: 100%;
            transition: var(--transition);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.5);
            filter: brightness(1.1);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* PROGRESS BAR */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* STATUS */
        .status {
            font-size: 13px;
            margin-top: 10px;
            font-weight: 600;
            color: var(--muted);
            text-align: right;
            letter-spacing: 0.5px;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--glass-heavy); backdrop-filter: blur(20px);
            border: 1px solid var(--primary); color: white;
            padding: 20px 30px; border-radius: 20px; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 1000;
        }

        /* LOADING STRIPES ANIMATION */
        .loading {
            background: linear-gradient(
                90deg, 
                var(--primary) 0%, 
                #4ade80 50%, 
                var(--primary) 100%
            );
            background-size: 200% 100%;
            animation: moveGradient 1.5s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar span, .logo span { display: none; }
            .main { margin-left: 120px; }
        }
    </style>
</head>

<body>

<div class="glass-master">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="sidebar">
    <div class="logo">
        <i data-lucide="graduation-cap" size="32"></i> <span>EduSeat</span>
    </div>

    <div class="nav-group">
        <button class="nav-btn" onclick="go('dashboard')"><i data-lucide="layout-grid"></i> <span>Dashboard</span></button>
        <button class="nav-btn" onclick="go('upload')"><i data-lucide="cloud-upload"></i> <span>Upload</span></button>
        <button class="nav-btn" onclick="go('instructions')"><i data-lucide="file-text"></i> <span>Instructions</span></button>
        <button class="nav-btn" onclick="go('generate')"><i data-lucide="cpu"></i> <span>Generate</span></button>
        <button class="nav-btn active" onclick="go('email')"><i data-lucide="send"></i> <span>Email</span></button>
        <button class="nav-btn" onclick="go('history')"><i data-lucide="history"></i> <span>History</span></button>
    </div>

    <div class="sidebar-footer">
        <div class="toggle" onclick="toggleTheme()"><i data-lucide="palette"></i> <span>Theme</span></div>
        <button class="logout" onclick="logout()"><i data-lucide="log-out"></i> <span>Logout</span></button>
    </div>
</div>

<div class="main">
    <h2>Email Dispatch</h2>

    <div class="panel-grid">

        <!-- STUDENTS -->
        <div class="card">
            <h3><i data-lucide="users"></i> Student Emails</h3>
            <textarea id="studentMsg">Dear Student,

Your seating arrangement is attached.

Regards
Exam Cell</textarea>

            <button class="btn" id="studentBtn" onclick="sendStudents()">
                <i data-lucide="mail-plus"></i> Send Student Emails
            </button>

            <div class="progress-bar">
                <div class="progress-fill" id="studentBar"></div>
            </div>
            <div class="status" id="studentStatus">System Idle</div>
        </div>

        <!-- TEACHERS -->
        <div class="card">
            <h3><i data-lucide="shield-check"></i> Teacher Emails</h3>
            <textarea id="teacherMsg">You are assigned invigilation duty.

Room: {{room}}

Instructions attached.

Regards
Exam Cell</textarea>

            <button class="btn" id="teacherBtn" onclick="sendTeachers()">
                <i data-lucide="send"></i> Send Teacher Emails
            </button>

            <div class="progress-bar">
                <div class="progress-fill" id="teacherBar"></div>
            </div>
            <div class="status" id="teacherStatus">System Idle</div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    /* ================= LOGIC PRESERVED EXACTLY ================= */
    lucide.createIcons();

    const API="http://localhost:8081/api";

    /* THEME */
    (function(){
        const saved=localStorage.getItem("theme");
        if(saved==="light") document.body.classList.add("light");
    })();

    function toggleTheme(){
        document.body.classList.toggle("light");
        localStorage.setItem("theme",
            document.body.classList.contains("light")?"light":"dark");
    }

    function go(p){ window.location=p+".html"; }
    function logout(){ window.location="login.html"; }

    /* TOAST */
    function toast(msg){
        let t=document.getElementById("toast");
        t.innerText=msg;
        t.style.display="block";
        setTimeout(()=>t.style.display="none",3000);
    }

    /* SEND STUDENTS */
    async function sendStudents(){
        let msg=document.getElementById("studentMsg").value;
        let bar=document.getElementById("studentBar");
        let status=document.getElementById("studentStatus");
        let btn=document.getElementById("studentBtn");

        btn.disabled=true;
        status.innerText="Connecting to SMTP...";
        bar.style.width="70%";
        bar.classList.add("loading");

        try {
            await fetch(API+"/send/student-mails?msg="+encodeURIComponent(msg));
            bar.classList.remove("loading");
            bar.style.width="100%";
            status.innerHTML="Transmission Completed ✅";
            toast("Student Emails Sent");
        } catch(e) {
            bar.style.width="0%";
            bar.classList.remove("loading");
            status.innerText="Error in Dispatch ❌";
            toast("Error sending");
        }
        btn.disabled=false;
    }

    /* SEND TEACHERS */
    async function sendTeachers(){
        let msg=document.getElementById("teacherMsg").value;
        let bar=document.getElementById("teacherBar");
        let status=document.getElementById("teacherStatus");
        let btn=document.getElementById("teacherBtn");

        btn.disabled=true;
        status.innerText="Connecting to SMTP...";
        bar.style.width="70%";
        bar.classList.add("loading");

        try {
            await fetch(API+"/send/teacher-mails?msg="+encodeURIComponent(msg));
            bar.classList.remove("loading");
            bar.style.width="100%";
            status.innerHTML="Transmission Completed ✅";
            toast("Teacher Emails Sent");
        } catch(e) {
            bar.style.width="0%";
            bar.classList.remove("loading");
            status.innerText="Error in Dispatch ❌";
            toast("Error sending");
        }
        btn.disabled=false;
    }
</script>
</body>
</html>
