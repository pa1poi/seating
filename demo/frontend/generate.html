<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Seating — EduSeat</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ================= PREMIUM GLASS VARIABLES ================= */
        :root {
            --primary: #22c55e;
            --primary-glow: rgba(34, 197, 94, 0.4);
            --bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --muted: #94a3b8;
            --sidebar-width: 280px;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.light {
            --bg: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-heavy: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
        }

        /* ================= DYNAMIC BACKGROUND ================= */
        .glass-master {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: var(--bg);
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--primary); top: -10%; right: -5%; }
        .orb-2 { width: 500px; height: 500px; background: #16a34a; bottom: -10%; left: -5%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* ================= GLOBAL STYLES ================= */
        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ================= SIDEBAR (FLOATING GLASS) ================= */
        .sidebar {
            width: var(--sidebar-width);
            height: calc(100vh - 40px);
            margin: 20px;
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 24px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: var(--transition);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 50px;
            display: flex; align-items: center; gap: 15px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .nav-btn {
            padding: 16px 20px;
            border: none; background: transparent;
            color: var(--muted); border-radius: 18px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            font-size: 15px; font-weight: 500; margin-bottom: 8px;
            transition: var(--transition);
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); transform: translateX(8px); }
        .nav-btn.active { color: var(--primary); background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }

        .sidebar-footer { margin-top: auto; }

        .toggle {
            background: var(--glass-bg);
            padding: 14px; border-radius: 16px;
            cursor: pointer; text-align: center; font-size: 14px;
            border: 1px solid var(--glass-border); margin-bottom: 12px;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .logout {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444; padding: 14px; border-radius: 16px;
            cursor: pointer; width: 100%; font-weight: 600; transition: var(--transition);
        }
        .logout:hover { background: #ef4444; color: white; }

        /* ================= MAIN CONTENT ================= */
        .main {
            margin-left: calc(var(--sidebar-width) + 60px);
            padding: 60px 40px;
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PROGRESS BAR GLASS */
        .progress {
            display: flex; gap: 15px; margin-bottom: 40px;
        }

        .step {
            flex: 1; padding: 12px; border-radius: 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            text-align: center; font-size: 13px; font-weight: 600;
            transition: var(--transition);
        }

        .step.active {
            background: rgba(34, 197, 94, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        h2 { font-size: 36px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }

        /* ================= GLASS CARD ================= */
        .card {
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 45px;
            border-radius: 35px;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: var(--transition);
        }

        .card:hover { transform: translateY(-5px); }

        /* BUTTONS */
        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 16px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
            transform: translateY(-2px);
            color: var(--primary);
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 800;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.3);
        }

        .generate-btn:hover {
            filter: brightness(1.1);
            color: white;
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.5);
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 25px;
        }

        /* LOADER */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            display: none;
            margin: 25px auto;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* STATUS */
        .status {
            text-align: center;
            font-size: 15px;
            color: var(--primary);
            font-weight: 600;
            min-height: 24px;
            letter-spacing: 0.5px;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--glass-heavy); backdrop-filter: blur(20px);
            border: 1px solid var(--primary); color: white;
            padding: 20px 30px; border-radius: 20px; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 1000;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar span, .logo span { display: none; }
            .main { margin-left: 120px; }
            .card { width: 100%; }
        }
    </style>
</head>

<body>

<div class="glass-master">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <i data-lucide="graduation-cap" size="32"></i> <span>EduSeat</span>
    </div>

    <div class="nav-group">
        <button class="nav-btn" onclick="go('dashboard')"><i data-lucide="layout-grid"></i> <span>Dashboard</span></button>
        <button class="nav-btn" onclick="go('upload')"><i data-lucide="cloud-upload"></i> <span>Upload</span></button>
        <button class="nav-btn" onclick="go('instructions')"><i data-lucide="file-text"></i> <span>Instructions</span></button>
        <button class="nav-btn active" onclick="go('generate')"><i data-lucide="cpu"></i> <span>Generate</span></button>
        <button class="nav-btn" onclick="go('email')"><i data-lucide="send"></i> <span>Email</span></button>
        <button class="nav-btn" onclick="go('history')"><i data-lucide="history"></i> <span>History</span></button>
    </div>

    <div class="sidebar-footer">
        <div class="toggle" onclick="toggleTheme()"><i data-lucide="palette"></i> <span>Theme</span></div>
        <button class="logout" onclick="logout()"><i data-lucide="log-out"></i> <span>Logout</span></button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="progress">
        <div class="step">1. Upload</div>
        <div class="step">2. Instructions</div>
        <div class="step active">3. Generate</div>
        <div class="step">4. Email</div>
    </div>

    <h2>Generate & Download</h2>

    <div class="card">
        <button class="btn generate-btn" onclick="allocate()">
            <i data-lucide="settings"></i> Run Seating Algorithm
        </button>

        <div class="loader" id="loader"></div>
        <div class="status" id="statusText"></div>

        <div class="button-grid">
            <button class="btn" onclick="download('/pdf/student')">
                <i data-lucide="user"></i> Student PDF
            </button>

            <button class="btn" onclick="download('/pdf/teacher')">
                <i data-lucide="shield"></i> Teacher PDF
            </button>

            <button class="btn" onclick="download('/pdf/teacher-allocation')">
                <i data-lucide="file-spreadsheet"></i> Allocation PDF
            </button>

            <button class="btn" onclick="nextPage()" style="background: rgba(34,197,94,0.1); border-color: var(--primary);">
                Email Phase <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>

if (window.lucide) {
    lucide.createIcons();
}

const API = "http://localhost:8081/api";
let generated = false;


/* ================= THEME ================= */

(function(){
    const saved = localStorage.getItem("theme");
    if(saved==="light") document.body.classList.add("light");
})();

function toggleTheme(){
    document.body.classList.toggle("light");
    localStorage.setItem(
        "theme",
        document.body.classList.contains("light") ? "light":"dark"
    );
}


/* ================= NAV ================= */

function go(p){
    window.location.href = p + ".html";
}

function logout(){
    window.location.href="login.html";
}


/* ================= TOAST ================= */

function toast(msg){
    let t=document.getElementById("toast");
    if(!t) return;
    t.innerText=msg;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",3000);
}


/* ================= ALLOCATION ================= */

async function allocate(){

    document.getElementById("loader").style.display="block";
    document.getElementById("statusText").innerText="Running smart allocation...";

    try{

        const meta = JSON.parse(localStorage.getItem("examMeta"));

        if(!meta){
            toast("Missing exam data ❌");
            return;
        }

        const request = {
            semester: parseInt(meta.semester),
            year: parseInt(meta.year),
            course: meta.course,
            studentsPerBench: parseInt(meta.studentsPerBench)
        };

        console.log("Sending Request:", request);

        const res = await fetch(API + "/allocate",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(request)
        });

        const text = await res.text();
        console.log("Server Response:", text);

        if(!res.ok){
            throw new Error(text);
        }

        generated = true;

        document.getElementById("statusText").innerHTML =
            "<i data-lucide='check-circle' style='width:18px'></i> Allocation Completed Successfully";

        if(window.lucide) lucide.createIcons();

        toast("Seating Generated Successfully");

    }catch(e){

        console.error("ALLOC ERROR:", e);

        document.getElementById("statusText").innerText="Error during generation ❌";
        toast("Generation Failed");

    }

    document.getElementById("loader").style.display="none";
}


/* ================= DOWNLOAD ================= */

function download(endpoint){

    if(!generated){
        toast("Please generate seating first ❗");
        return;
    }

    window.open(API + endpoint);
}


/* ================= NEXT ================= */

function nextPage(){

    if(!generated){
        toast("Generate seating first ❗");
        return;
    }

    go("email");
}

</script>

</body>
</html>
